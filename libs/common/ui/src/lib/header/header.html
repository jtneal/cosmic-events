<mat-toolbar>
  <a class="logo" routerLink="/">
    <img alt="C" src="cosmic-events-icon-32.png" />
    <span>Cosmic Events</span>
  </a>
  <nav id="narrow-nav">
    <button mat-button [matMenuTriggerFor]="mobileMenu"><mat-icon>menu</mat-icon></button>
    <mat-menu #mobileMenu="matMenu">
      @for (link of links; track $index) {
        <a mat-menu-item [routerLink]="link.link">
          <mat-icon>{{ link.icon }}</mat-icon>
          <span>{{ link.label }}</span>
        </a>
      }
    </mat-menu>
  </nav>
  <nav id="wide-nav">
    @for (link of links | slice: 0 : 3; track $index) {
      <a
        class="buttonized"
        mat-button
        [routerLink]="link.link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <mat-icon>{{ link.icon }}</mat-icon>
        <span>{{ link.label }}</span>
      </a>
    }
    <button mat-button [matMenuTriggerFor]="moreMenu">
      <mat-icon>more_vert</mat-icon>
      More
    </button>
    <mat-menu #moreMenu="matMenu">
      @for (link of links | slice: 3; track $index) {
        <a mat-menu-item [routerLink]="link.link">
          <mat-icon>{{ link.icon }}</mat-icon>
          <span>{{ link.label }}</span>
        </a>
      }
    </mat-menu>
  </nav>
</mat-toolbar>
